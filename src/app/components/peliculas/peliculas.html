<div class="container">
    <div class="row g-4">
        <div class="col-sm-6 col-md-4 pt-4 mb-4" *ngFor="let pelicula of peliculas">
            <div class="card bg-dark text-white h-100 px-2 py-4"> 
                <div class="contenedor-img">
                    <img [src]="pelicula.image" 
                        class="card-img-top rounded" 
                        [alt]="pelicula.title">
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{pelicula.title}}</h5>
                    <p class="card-text">{{pelicula.description}}</p>
                    <div>
                        <span class="fw-bold text-muted d-block mb-1" style="font-size: 0.75rem;">Género:</span>
                        <div class="d-flex flex-wrap gap-1">
                            <span class="badge px-2 py-1" 
                                  *ngFor="let g of pelicula.genre" 
                                  [ngClass]="obtenerColorGenero(g)">
                                {{ g }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
