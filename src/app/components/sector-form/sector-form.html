<div class="card shadow-sm mt-3">
    <div class="card-header bg-dark text-white">
        <h5 class="mb-0">Gestión de Sector</h5>
    </div>
    <div class="card-body">
        <form>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre del Sector</label>
                <input type="text" class="form-control" id="nombre" name="nombre" [(ngModel)]="sector.nombre" [placeholder]="sector.nombre">
            </div>
            <div class="mb-3">
                <label for="funcion" class="form-label">Función</label>
                <input type="text" class="form-control" id="funcion" name="funcion" [(ngModel)]="sector.funcion" [placeholder]="sector.funcion">
            </div>
            
            <div class="mb-3">
                <label for="responsable" class="form-label">Responsable</label>
                <input type="text" class="form-control" id="responsable" 
                [value]="sector.responsable.nombre + ', '+ sector.responsable.apellido" 
                name="responsable" disabled>
                <!-- Botón que activa el modal -->
                <button type="button" class="btn btn-secondary mt-2" data-bs-toggle="modal" data-bs-target="#responsableModal">Asignar</button>
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-success" (click)="agregarSector()">
                    <i class="bi bi-plus-lg"></i> Agregar
                </button>
                <button type="button" class="btn btn-primary" (click)="modificarSector()">
                    <i class="bi bi-pencil-square"></i> Modificar
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Modal de Selección de Responsable -->
<div class="modal fade" id="responsableModal" tabindex="-1" aria-labelledby="responsableModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="responsableModalLabel">Seleccionar Responsable</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Lista de empleados disponibles para el cargo...</p>
                <table class="table table-sm table-hover">
                    <thead>
                        <tr>
                            <th>Legajo</th>
                            <th>Nombre</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let agente of agentes">
                            <td>{{agente.legajo}}</td> 
                            <td>{{agente.apellido}}, {{agente.nombre}}</td>
                            <td>
                                <button type="button" class="btn btn-primary btn-sm" (click)="seleccionarAgente(agente)" data-bs-dismiss="modal">
                                    Seleccionar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
