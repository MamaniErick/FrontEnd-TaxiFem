<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      
      <div class="d-flex flex-wrap justify-content-between align-items-center border-bottom pb-3 mb-4">
        <h2 class="fw-bold text-primary m-0">TITULO</h2>
        
        <form class="d-flex align-items-end gap-2 flex-wrap">
          <div>
            <label for="ciudad" class="form-label fw-semibold mb-1">???:</label>
            <input type="text" name="ciudad" id="ciudad" class="form-control" [(ngModel)]="aux">
          </div>
          <button type="button" class="btn btn-primary fw-semibold" (click)="clik()">
            Buscar
          </button>
        </form>
      </div>

      <div>
        <h3 class="my-4 text-secondary text-center fw-bold">TITULO TABLA</h3>
        <div class="table-responsive shadow-sm rounded border">
          <table class="table table-hover table-striped align-middle m-0">
            <thead class="table-light border-bottom">
              <tr>
                <th scope="col" class="py-3">#</th>
                <th scope="col" class="py-3">?</th>
                <th scope="col" class="py-3">??</th>
                <th scope="col" class="py-3">???</th>
                <th scope="col" class="py-3">????</th>
                <th scope="col" class="py-3">Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let a of array; let i = index">
                <td class="fw-bold">{{ i + 1 }}</td>
                <td>{{ a }}</td>
                <td>{{a }}</td>
                <td>
                  <button class="btn btn-warning btn-sm fw-semibold shadow-sm" 
                          data-bs-toggle="modal" 
                          data-bs-target="#modelosModal" 
                          (click)="clik()">
                    Detalles
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modelosModal" tabindex="-1" aria-labelledby="modelosModalLabel">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-light">
        <h5 class="modal-title text-primary fw-bold" id="modelosModalLabel">
          MODAL<span class="text-dark"> NOMBRE</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="cerrarModal()"></button>
      </div>            
        
      <div class="modal-body bg-light bg-opacity-25 p-4">
        <div *ngIf="aux; else cargando">
          
          <div *ngIf="aux; else vacio">
            <div class="row row-cols-1 row-cols-md-3 g-3">
              
              <div class="col" *ngFor="let d of array">
                <div class="card h-100 border-secondary border-opacity-25 shadow-sm text-center">
                  <div class="card-header bg-white fw-bold text-secondary border-bottom border-opacity-10 py-3">
                    {{ d}}
                  </div>
                  <div class="card-body d-flex flex-column justify-content-center">
                    <div class="mb-2">
                      <span class="text-muted small d-block">Máxima</span>
                    </div>
                    <div class="mb-3">
                      <span class="text-muted small d-block">Mínima</span>
                    </div>
                    <div class="mt-auto border-top border-opacity-10 pt-2">
                      <span class="text-muted small d-block mb-1">Lluvia</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <ng-template #vacio>
            <div class="alert alert-warning text-center m-0" role="alert">
              Esta ciudad no posee registros de pronóstico.
            </div>
          </ng-template>
        </div>
        <ng-template #cargando>
          <p class="text-muted text-center m-0 py-3">Esperando selección de ciudad...</p>
        </ng-template>
      </div>
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-secondary w-100 fw-semibold" data-bs-dismiss="modal" (click)="cerrarModal()">Cerrar</button>
      </div>        
    </div>
  </div>
</div>
