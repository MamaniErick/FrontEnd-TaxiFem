<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card bg-dark text-white border-secondary shadow-lg rounded-4 p-4">
                <h2 class="text-center fw-bold mb-4 text-warning">Generador de Códigos QR</h2>
                <form>
                    <div class="mb-3">
                        <label for="texto" class="form-label fw-semibold">Ingrese el texto para el QR:</label>
                        <input type="text" name="texto" id="texto" class="form-control text-dark mb-3" [(ngModel)]="texto">
                        <button type="button" class="btn btn-warning w-100 py-2 fw-bold rounded-3 text-dark mb-3" (click)="obtenerCodigo()">
                            Generar QR
                        </button>
                    </div>
                    <div *ngIf="resultado" class="text-center p-3 bg-white rounded-3 mt-2 animate__animated animate__fadeIn">
                        <span class="text-dark d-block small fw-bold mb-2">Resultado Base64 Exitoso</span>
                        <img [src]="resultado" alt="QR Base64" class="img-fluid mx-auto d-block" style="max-width: 250px;">
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
