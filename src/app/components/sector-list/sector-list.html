<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Lista de Sectores</h2>
        <button type="button" class="btn btn-success" (click)="agregarSector()">
            <i class="bi bi-plus-lg"></i> Agregar
        </button>
    </div>

    <div class="table-responsive shadow-sm">
        <table class="table table-hover table-striped border">
            <thead class="table-dark">
                <tr>
                    <th scope="col">Nombre</th>
                    <th scope="col">Función</th>
                    <th scope="col" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Fila de ejemplo 1 -->
                <tr *ngFor="let sector of sectores">
                    <td>{{sector.nombre}}</td>
                    <td>{{sector.funcion}}</td>
                    <td class="text-center">
                        <button class="btn btn-primary btn-sm me-2" (click)="editarSector(sector)">Editar</button>
                        <button class="btn btn-danger btn-sm" (click)="eliminarSector(sector)">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
